<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeRead Eye Care Options</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, sans-serif;
        color: #1a1512;
        background:
          radial-gradient(circle at top right, rgba(245, 192, 118, 0.2), transparent 35%),
          linear-gradient(180deg, #fbf4e9 0%, #fffdf8 100%);
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      .card {
        background: rgba(255, 255, 255, 0.88);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 46px rgba(113, 87, 48, 0.11);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin: 20px 0 24px;
      }

      .metric {
        padding: 16px;
        border-radius: 18px;
        background: #fff8ee;
      }

      .runtime-status {
        margin: 8px 0 24px;
        padding: 18px 20px;
        border-radius: 18px;
        background: #fff8ee;
      }

      .runtime-status h2 {
        margin: 0 0 8px;
      }

      .runtime-status p {
        margin: 0 0 12px;
        color: #5f4f3f;
      }

      .status-list {
        display: grid;
        gap: 10px;
        margin: 0;
      }

      .status-list div {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(76, 59, 34, 0.12);
      }

      .status-list div:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .status-list dt {
        color: #6f5b47;
      }

      .status-list dd {
        margin: 0;
        font-weight: 700;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        background: #2d6a4f;
        color: #fff;
      }

      button.secondary {
        background: #d1495b;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .trend {
        margin-top: 28px;
      }

      .strategy-list {
        display: grid;
        gap: 12px;
      }

      .strategy-option {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 14px 16px;
        border-radius: 18px;
        background: #fff8ee;
      }

      .strategy-option span {
        display: flex;
        flex-direction: column;
      }

      .strategy-option small {
        color: #6f5b47;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        padding: 10px 0;
        border-bottom: 1px solid rgba(76, 59, 34, 0.12);
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
