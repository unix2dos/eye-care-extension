<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeRead Eye Care</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        padding: 16px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, sans-serif;
        color: #1f1a17;
        background: linear-gradient(180deg, #f5ecdf 0%, #fffaf2 100%);
      }

      .panel {
        border-radius: 18px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 14px 40px rgba(127, 93, 47, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .metric {
        padding: 12px;
        border-radius: 14px;
        background: #fff7ec;
      }

      .metric strong {
        display: block;
        font-size: 20px;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .hint {
        margin-top: 12px;
        color: #6d5d4b;
        font-size: 12px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        cursor: pointer;
        background: #2d6a4f;
        color: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        background: #b7b0a7;
        color: #f4efe8;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
