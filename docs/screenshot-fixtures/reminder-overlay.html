<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminder Overlay Screenshot Fixture</title>
    <style>
      body {
        margin: 0;
        font: 18px/1.9 Georgia, "Times New Roman", serif;
        background:
          linear-gradient(180deg, rgba(250, 245, 237, 0.92), rgba(250, 245, 237, 0.98)),
          linear-gradient(120deg, #f1e7d8, #fbf8f2);
        color: #3c342b;
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
        padding: 72px 32px 120px;
      }

      .badge {
        display: inline-block;
        margin-bottom: 24px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(233, 139, 86, 0.12);
        color: #7a4a2c;
        font: 13px/1.2 -apple-system, BlinkMacSystemFont, sans-serif;
      }

      h1 {
        margin: 0 0 22px;
        font-size: 40px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 22px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="badge">微信读书阅读页示意（已脱敏）</div>
      <h1>示例阅读项目</h1>
      <p>这是用于 README 展示的真实界面截图场景。页面内容已经过脱敏处理，只保留阅读页版式、字体节奏与提醒浮层效果。</p>
      <p>当活跃阅读累计达到提醒间隔时，页面会弹出提醒。你可以在扩展设置里选择全屏遮罩或右下角卡片样式。</p>
      <p>提醒支持固定语音，也可以在扩展设置里关闭语音播放。预览提醒不会写入真实提醒统计。</p>
      <p>这个页面只用于截图，不包含真实书籍内容、账号信息或阅读历史。</p>
    </div>
    <script type="module" src="./reminder-overlay-entry.js"></script>
  </body>
</html>
