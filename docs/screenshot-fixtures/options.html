<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Options Screenshot Fixture</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, sans-serif;
        color: #1a1512;
        background:
          radial-gradient(circle at top right, rgba(245, 192, 118, 0.2), transparent 35%),
          linear-gradient(180deg, #fbf4e9 0%, #fffdf8 100%);
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      .card {
        background: rgba(255, 255, 255, 0.88);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 46px rgba(113, 87, 48, 0.11);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin: 20px 0 24px;
      }

      .metric {
        padding: 16px;
        border-radius: 18px;
        background: #fff8ee;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        background: #2d6a4f;
        color: #fff;
      }

      button.secondary {
        background: #d1495b;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .trend {
        margin-top: 28px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        padding: 10px 0;
        border-bottom: 1px solid rgba(76, 59, 34, 0.12);
      }
    </style>
  </head>
